<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#bc8cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="196" width="900" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Ecology nodes visualization -->
  <g opacity="0.12">
    <circle cx="680" cy="60" r="45" stroke="#58a6ff" stroke-width="1" fill="none"/>
    <circle cx="750" cy="110" r="35" stroke="#bc8cff" stroke-width="1" fill="none"/>
    <circle cx="640" cy="130" r="28" stroke="#58a6ff" stroke-width="1" fill="none"/>
    <circle cx="810" cy="65" r="20" stroke="#bc8cff" stroke-width="1" fill="none"/>
    <circle cx="720" cy="160" r="18" stroke="#58a6ff" stroke-width="1" fill="none"/>
    <circle cx="850" cy="130" r="25" stroke="#bc8cff" stroke-width="1" fill="none"/>
    <line x1="680" y1="60" x2="750" y2="110" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="750" y1="110" x2="640" y2="130" stroke="#bc8cff" stroke-width="0.5"/>
    <line x1="680" y1="60" x2="810" y2="65" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="750" y1="110" x2="720" y2="160" stroke="#bc8cff" stroke-width="0.5"/>
    <line x1="810" y1="65" x2="850" y2="130" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="640" y1="130" x2="720" y2="160" stroke="#bc8cff" stroke-width="0.5"/>
  </g>
  <!-- Belief nodes (filled) -->
  <g opacity="0.25">
    <circle cx="690" cy="55" r="4" fill="#58a6ff"/>
    <circle cx="670" cy="68" r="3" fill="#bc8cff"/>
    <circle cx="755" cy="105" r="4" fill="#58a6ff"/>
    <circle cx="740" cy="118" r="3" fill="#bc8cff"/>
    <circle cx="645" cy="125" r="3" fill="#58a6ff"/>
    <circle cx="815" cy="60" r="3" fill="#bc8cff"/>
    <circle cx="725" cy="155" r="3" fill="#58a6ff"/>
    <circle cx="855" cy="125" r="3" fill="#bc8cff"/>
  </g>
  <!-- Title -->
  <text x="50" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#e6edf3" letter-spacing="-1">ABES</text>
  <text x="50" y="116" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">Adaptive Belief Ecology System</text>
  <!-- Tagline -->
  <text x="50" y="155" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#58a6ff" letter-spacing="0.3">Headless cognitive memory engine for autonomous AI</text>
  <!-- Stats bar -->
  <g transform="translate(50, 172)">
    <rect width="75" height="18" rx="9" fill="#58a6ff" fill-opacity="0.12"/>
    <text x="37" y="13" font-family="system-ui, sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle" font-weight="600">821 tests</text>
    <rect x="82" width="75" height="18" rx="9" fill="#bc8cff" fill-opacity="0.12"/>
    <text x="119" y="13" font-family="system-ui, sans-serif" font-size="10" fill="#bc8cff" text-anchor="middle" font-weight="600">15 agents</text>
    <rect x="164" width="95" height="18" rx="9" fill="#3fb950" fill-opacity="0.12"/>
    <text x="211" y="13" font-family="system-ui, sans-serif" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="600">82.5% cog eval</text>
    <rect x="266" width="80" height="18" rx="9" fill="#d29922" fill-opacity="0.12"/>
    <text x="306" y="13" font-family="system-ui, sans-serif" font-size="10" fill="#d29922" text-anchor="middle" font-weight="600">RL-tuned</text>
  </g>
</svg>
